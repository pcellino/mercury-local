<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="crosshatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
    </pattern>
    <pattern id="stipple" width="5" height="5" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.7" fill="#1a1a1a" opacity="0.25"/>
      <circle cx="4" cy="4" r="0.5" fill="#1a1a1a" opacity="0.2"/>
    </pattern>
    <pattern id="hatch" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#1a1a1a" stroke-width="0.8" opacity="0.25"/>
    </pattern>
    
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="#ece6d9"/>
  <rect width="800" height="450" fill="url(#stipple)"/>
  <rect x="1" y="1" width="798" height="448" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.3"/>

  <!-- Ground -->
  <line x1="100" y1="370" x2="700" y2="370" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Building 1 - tall left -->
  <rect x="160" y="140" width="70" height="230" fill="url(#crosshatch)" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="168" y="155" width="12" height="18" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="188" y="155" width="12" height="18" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="208" y="155" width="12" height="18" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="168" y="185" width="12" height="18" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="188" y="185" width="12" height="18" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="208" y="185" width="12" height="18" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Building 2 - tallest center -->
  <rect x="260" y="90" width="80" height="280" fill="url(#hatch)" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="300" y1="90" x2="300" y2="370" stroke="#1a1a1a" stroke-width="1.5" opacity="0.4"/>
  <!-- Antenna -->
  <line x1="300" y1="90" x2="300" y2="55" stroke="#1a1a1a" stroke-width="2.5"/>
  <circle cx="300" cy="52" r="4" fill="#1a1a1a"/>
  <!-- Building 3 - medium -->
  <rect x="370" y="190" width="90" height="180" fill="url(#crosshatch)" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="380" y="200" width="15" height="20" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="405" y="200" width="15" height="20" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="430" y="200" width="15" height="20" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Building 4 - shorter -->
  <rect x="490" y="230" width="75" height="140" fill="url(#hatch)" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Building 5 - tall right -->
  <rect x="590" y="160" width="60" height="210" fill="url(#crosshatch)" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="598" y="175" width="10" height="15" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
  <rect x="615" y="175" width="10" height="15" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
  <rect x="632" y="175" width="10" height="15" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
</svg>