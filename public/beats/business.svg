<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="crosshatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#2d2d2d" stroke-width="0.5" opacity="0.15"/>
    </pattern>
    <pattern id="stipple" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.4" fill="#2d2d2d" opacity="0.2"/>
      <circle cx="4" cy="4" r="0.3" fill="#2d2d2d" opacity="0.15"/>
    </pattern>
    <pattern id="hatch-dense" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#2d2d2d" stroke-width="0.4" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="#f5f0e8"/>
  <rect width="800" height="450" fill="url(#stipple)"/>
  
  <!-- Buildings -->
  <rect x="200" y="180" width="50" height="190" fill="none" stroke="#2d2d2d" stroke-width="1.2"/>
  <rect x="200" y="180" width="50" height="190" fill="url(#crosshatch)"/>
  <rect x="260" y="140" width="60" height="230" fill="none" stroke="#2d2d2d" stroke-width="1.2"/>
  <rect x="260" y="140" width="60" height="230" fill="url(#hatch-dense)"/>
  <rect x="330" y="100" width="55" height="270" fill="none" stroke="#2d2d2d" stroke-width="1.5"/>
  <rect x="330" y="100" width="55" height="270" fill="url(#crosshatch)"/>
  <rect x="395" y="160" width="50" height="210" fill="none" stroke="#2d2d2d" stroke-width="1.2"/>
  <rect x="455" y="120" width="65" height="250" fill="none" stroke="#2d2d2d" stroke-width="1.2"/>
  <rect x="455" y="120" width="65" height="250" fill="url(#hatch-dense)"/>
  <rect x="530" y="200" width="55" height="170" fill="none" stroke="#2d2d2d" stroke-width="1.2"/>
  <!-- Windows (dots) -->
  <circle cx="220" cy="210" r="2" fill="#2d2d2d" opacity="0.3"/>
  <circle cx="235" cy="210" r="2" fill="#2d2d2d" opacity="0.3"/>
  <circle cx="220" cy="230" r="2" fill="#2d2d2d" opacity="0.3"/>
  <circle cx="235" cy="230" r="2" fill="#2d2d2d" opacity="0.3"/>
  <circle cx="350" cy="130" r="2" fill="#2d2d2d" opacity="0.3"/>
  <circle cx="365" cy="130" r="2" fill="#2d2d2d" opacity="0.3"/>
  <!-- Ground line -->
  <line x1="170" y1="370" x2="620" y2="370" stroke="#2d2d2d" stroke-width="1.5"/>
  <!-- Rising chart line overlay -->
  <polyline points="180,350 250,340 320,320 390,300 460,260 540,230 600,200" 
            fill="none" stroke="#2d2d2d" stroke-width="1.8" stroke-dasharray="4,3" opacity="0.5"/>

</svg>