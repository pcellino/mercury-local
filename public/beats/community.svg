<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="crosshatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#2d2d2d" stroke-width="0.5" opacity="0.15"/>
    </pattern>
    <pattern id="stipple" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.4" fill="#2d2d2d" opacity="0.2"/>
      <circle cx="4" cy="4" r="0.3" fill="#2d2d2d" opacity="0.15"/>
    </pattern>
    <pattern id="hatch-dense" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#2d2d2d" stroke-width="0.4" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="#f5f0e8"/>
  <rect width="800" height="450" fill="url(#stipple)"/>
  
  <!-- House 1 -->
  <polygon points="200,240 250,190 300,240" fill="none" stroke="#2d2d2d" stroke-width="1.5"/>
  <polygon points="200,240 250,190 300,240" fill="url(#crosshatch)"/>
  <rect x="210" y="240" width="80" height="80" fill="none" stroke="#2d2d2d" stroke-width="1.2"/>
  <rect x="235" y="270" width="25" height="50" fill="none" stroke="#2d2d2d" stroke-width="1"/>
  <!-- House 2 (taller) -->
  <polygon points="330,240 390,170 450,240" fill="none" stroke="#2d2d2d" stroke-width="1.5"/>
  <polygon points="330,240 390,170 450,240" fill="url(#hatch-dense)"/>
  <rect x="340" y="240" width="100" height="80" fill="none" stroke="#2d2d2d" stroke-width="1.2"/>
  <rect x="355" y="255" width="20" height="20" fill="none" stroke="#2d2d2d" stroke-width="0.8"/>
  <rect x="405" y="255" width="20" height="20" fill="none" stroke="#2d2d2d" stroke-width="0.8"/>
  <rect x="375" y="285" width="25" height="35" fill="none" stroke="#2d2d2d" stroke-width="1"/>
  <!-- House 3 -->
  <polygon points="480,240 520,200 560,240" fill="none" stroke="#2d2d2d" stroke-width="1.5"/>
  <rect x="488" y="240" width="65" height="80" fill="none" stroke="#2d2d2d" stroke-width="1.2"/>
  <rect x="505" y="275" width="22" height="45" fill="none" stroke="#2d2d2d" stroke-width="1"/>
  <!-- Tree -->
  <line x1="160" y1="230" x2="160" y2="320" stroke="#2d2d2d" stroke-width="1.5"/>
  <ellipse cx="160" cy="210" rx="25" ry="35" fill="none" stroke="#2d2d2d" stroke-width="1"/>
  <ellipse cx="160" cy="210" rx="25" ry="35" fill="url(#stipple)"/>
  <!-- Ground -->
  <line x1="130" y1="320" x2="590" y2="320" stroke="#2d2d2d" stroke-width="1"/>

</svg>