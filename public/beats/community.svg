<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="crosshatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
    </pattern>
    <pattern id="stipple" width="5" height="5" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.7" fill="#1a1a1a" opacity="0.25"/>
      <circle cx="4" cy="4" r="0.5" fill="#1a1a1a" opacity="0.2"/>
    </pattern>
    <pattern id="hatch" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#1a1a1a" stroke-width="0.8" opacity="0.25"/>
    </pattern>
    
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="#ece6d9"/>
  <rect width="800" height="450" fill="url(#stipple)"/>
  <rect x="1" y="1" width="798" height="448" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.3"/>

  <!-- Ground -->
  <line x1="80" y1="330" x2="720" y2="330" stroke="#1a1a1a" stroke-width="2"/>
  <!-- House 1 -->
  <rect x="140" y="240" width="120" height="90" fill="url(#crosshatch)" stroke="#1a1a1a" stroke-width="2.5"/>
  <polygon points="140,240 200,170 260,240" fill="url(#hatch)" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="180" y="275" width="30" height="55" fill="#ece6d9" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="150" y="260" width="22" height="22" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="161" y1="260" x2="161" y2="282" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="150" y1="271" x2="172" y2="271" stroke="#1a1a1a" stroke-width="1"/>
  <!-- House 2 (center, taller) -->
  <rect x="290" y="210" width="140" height="120" fill="url(#crosshatch)" stroke="#1a1a1a" stroke-width="3"/>
  <polygon points="290,210 360,130 430,210" fill="url(#hatch)" stroke="#1a1a1a" stroke-width="3"/>
  <rect x="340" y="260" width="35" height="70" fill="#ece6d9" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="300" y="230" width="28" height="28" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="314" y1="230" x2="314" y2="258" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="300" y1="244" x2="328" y2="244" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="395" y="230" width="28" height="28" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="409" y1="230" x2="409" y2="258" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="395" y1="244" x2="423" y2="244" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Chimney -->
  <rect x="380" y="140" width="18" height="40" fill="url(#hatch)" stroke="#1a1a1a" stroke-width="2"/>
  <!-- House 3 -->
  <rect x="460" y="250" width="120" height="80" fill="url(#crosshatch)" stroke="#1a1a1a" stroke-width="2.5"/>
  <polygon points="460,250 520,185 580,250" fill="url(#hatch)" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="500" y="278" width="28" height="52" fill="#ece6d9" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="468" y="265" width="22" height="22" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Tree -->
  <line x1="650" y1="280" x2="650" y2="330" stroke="#1a1a1a" stroke-width="3"/>
  <circle cx="650" cy="255" r="35" fill="url(#crosshatch)" stroke="#1a1a1a" stroke-width="2.5"/>
</svg>