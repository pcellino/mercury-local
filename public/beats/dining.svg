<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="crosshatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#2d2d2d" stroke-width="0.5" opacity="0.15"/>
    </pattern>
    <pattern id="stipple" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.4" fill="#2d2d2d" opacity="0.2"/>
      <circle cx="4" cy="4" r="0.3" fill="#2d2d2d" opacity="0.15"/>
    </pattern>
    <pattern id="hatch-dense" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#2d2d2d" stroke-width="0.4" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="#f5f0e8"/>
  <rect width="800" height="450" fill="url(#stipple)"/>
  
  <!-- Knife -->
  <path d="M 340 100 L 340 280" stroke="#2d2d2d" stroke-width="2"/>
  <path d="M 340 100 L 350 100 L 355 130 L 350 280 L 340 280" fill="none" stroke="#2d2d2d" stroke-width="1"/>
  <path d="M 340 100 L 350 100 L 355 130 L 350 280 L 340 280" fill="url(#hatch-dense)"/>
  <rect x="335" y="280" width="20" height="60" rx="3" fill="none" stroke="#2d2d2d" stroke-width="1.2"/>
  <!-- Fork -->
  <line x1="440" y1="100" x2="440" y2="180" stroke="#2d2d2d" stroke-width="1"/>
  <line x1="450" y1="100" x2="450" y2="180" stroke="#2d2d2d" stroke-width="1"/>
  <line x1="460" y1="100" x2="460" y2="180" stroke="#2d2d2d" stroke-width="1"/>
  <line x1="470" y1="100" x2="470" y2="180" stroke="#2d2d2d" stroke-width="1"/>
  <path d="M 435 180 Q 455 200 475 180" fill="none" stroke="#2d2d2d" stroke-width="1.2"/>
  <rect x="447" y="200" width="16" height="70" fill="none" stroke="#2d2d2d" stroke-width="1"/>
  <rect x="447" y="270" width="16" height="70" rx="3" fill="none" stroke="#2d2d2d" stroke-width="1.2"/>
  <!-- Plate circle (faint) -->
  <circle cx="400" cy="240" r="120" fill="none" stroke="#2d2d2d" stroke-width="0.6" opacity="0.2"/>
  <circle cx="400" cy="240" r="100" fill="none" stroke="#2d2d2d" stroke-width="0.4" opacity="0.15"/>

</svg>