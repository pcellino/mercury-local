<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="crosshatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#8a7d65" stroke-width="0.8" opacity="0.4"/>
    </pattern>
    <pattern id="stipple" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.5" fill="#8a7d65" opacity="0.15"/>
    </pattern>
    <pattern id="hatch" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(60)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#8a7d65" stroke-width="0.6" opacity="0.35"/>
    </pattern>
    <pattern id="engrave" width="3" height="3" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#8a7d65" stroke-width="0.4" opacity="0.3"/>
    </pattern>
    
  </defs>
  <rect width="800" height="450" fill="#0f1419"/>
  <rect width="800" height="450" fill="url(#stipple)"/>

  <!-- Dome -->
  <ellipse cx="400" cy="175" rx="155" ry="90" fill="url(#crosshatch)" stroke="#d4c5a9" stroke-width="2.5"/>
  <ellipse cx="400" cy="155" rx="110" ry="58" fill="none" stroke="#c8b88a" stroke-width="2"/>
  <ellipse cx="400" cy="138" rx="68" ry="34" fill="none" stroke="#c8b88a" stroke-width="1.8"/>
  <circle cx="400" cy="104" r="10" fill="none" stroke="#d4c5a9" stroke-width="2.5"/>
  <line x1="400" y1="94" x2="400" y2="74" stroke="#d4c5a9" stroke-width="2.5"/>
  <!-- Flag -->
  <path d="M 400 74 L 428 80 L 400 86" fill="none" stroke="#c8b88a" stroke-width="1.5"/>
  <!-- Pediment -->
  <path d="M 255 262 L 400 218 L 545 262" fill="url(#hatch)" stroke="#d4c5a9" stroke-width="2.5"/>
  <!-- Columns -->
  <line x1="278" y1="262" x2="278" y2="348" stroke="#d4c5a9" stroke-width="3.5"/>
  <line x1="326" y1="262" x2="326" y2="348" stroke="#d4c5a9" stroke-width="3.5"/>
  <line x1="374" y1="262" x2="374" y2="348" stroke="#d4c5a9" stroke-width="3.5"/>
  <line x1="426" y1="262" x2="426" y2="348" stroke="#d4c5a9" stroke-width="3.5"/>
  <line x1="474" y1="262" x2="474" y2="348" stroke="#d4c5a9" stroke-width="3.5"/>
  <line x1="522" y1="262" x2="522" y2="348" stroke="#d4c5a9" stroke-width="3.5"/>
  <!-- Column caps -->
  <rect x="268" y="256" width="20" height="6" fill="none" stroke="#c8b88a" stroke-width="1.2"/>
  <rect x="316" y="256" width="20" height="6" fill="none" stroke="#c8b88a" stroke-width="1.2"/>
  <rect x="364" y="256" width="20" height="6" fill="none" stroke="#c8b88a" stroke-width="1.2"/>
  <rect x="416" y="256" width="20" height="6" fill="none" stroke="#c8b88a" stroke-width="1.2"/>
  <rect x="464" y="256" width="20" height="6" fill="none" stroke="#c8b88a" stroke-width="1.2"/>
  <rect x="512" y="256" width="20" height="6" fill="none" stroke="#c8b88a" stroke-width="1.2"/>
  <!-- Base -->
  <rect x="245" y="348" width="310" height="16" fill="url(#engrave)" stroke="#d4c5a9" stroke-width="2"/>
  <!-- Steps -->
  <line x1="225" y1="364" x2="575" y2="364" stroke="#c8b88a" stroke-width="1.8"/>
  <line x1="210" y1="378" x2="590" y2="378" stroke="#c8b88a" stroke-width="1.8"/>
  <line x1="195" y1="392" x2="605" y2="392" stroke="#c8b88a" stroke-width="1.8"/>
  <!-- Decorative corner elements -->
  <path d="M 40 40 L 80 40 M 40 40 L 40 80" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 760 40 L 720 40 M 760 40 L 760 80" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 40 410 L 80 410 M 40 410 L 40 370" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 760 410 L 720 410 M 760 410 L 760 370" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
</svg>