<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="crosshatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#2d2d2d" stroke-width="0.5" opacity="0.15"/>
    </pattern>
    <pattern id="stipple" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.4" fill="#2d2d2d" opacity="0.2"/>
      <circle cx="4" cy="4" r="0.3" fill="#2d2d2d" opacity="0.15"/>
    </pattern>
    <pattern id="hatch-dense" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#2d2d2d" stroke-width="0.4" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="#f5f0e8"/>
  <rect width="800" height="450" fill="url(#stipple)"/>
  
  <!-- Dome -->
  <ellipse cx="400" cy="180" rx="140" ry="80" fill="none" stroke="#2d2d2d" stroke-width="1.5"/>
  <ellipse cx="400" cy="180" rx="140" ry="80" fill="url(#crosshatch)"/>
  <ellipse cx="400" cy="160" rx="100" ry="50" fill="none" stroke="#2d2d2d" stroke-width="1.2"/>
  <ellipse cx="400" cy="145" rx="60" ry="30" fill="none" stroke="#2d2d2d" stroke-width="1"/>
  <circle cx="400" cy="115" r="8" fill="none" stroke="#2d2d2d" stroke-width="1.5"/>
  <line x1="400" y1="107" x2="400" y2="95" stroke="#2d2d2d" stroke-width="1.5"/>
  <!-- Columns -->
  <line x1="290" y1="260" x2="290" y2="340" stroke="#2d2d2d" stroke-width="2.5"/>
  <line x1="340" y1="250" x2="340" y2="340" stroke="#2d2d2d" stroke-width="2.5"/>
  <line x1="390" y1="245" x2="390" y2="340" stroke="#2d2d2d" stroke-width="2.5"/>
  <line x1="440" y1="245" x2="440" y2="340" stroke="#2d2d2d" stroke-width="2.5"/>
  <line x1="490" y1="250" x2="490" y2="340" stroke="#2d2d2d" stroke-width="2.5"/>
  <line x1="510" y1="260" x2="510" y2="340" stroke="#2d2d2d" stroke-width="2.5"/>
  <!-- Base -->
  <rect x="260" y="340" width="280" height="15" fill="none" stroke="#2d2d2d" stroke-width="1.5"/>
  <rect x="260" y="340" width="280" height="15" fill="url(#hatch-dense)"/>
  <!-- Steps -->
  <line x1="240" y1="355" x2="560" y2="355" stroke="#2d2d2d" stroke-width="1"/>
  <line x1="230" y1="365" x2="570" y2="365" stroke="#2d2d2d" stroke-width="1"/>
  <line x1="220" y1="375" x2="580" y2="375" stroke="#2d2d2d" stroke-width="1"/>
  <!-- Crosshatch shadow under dome -->
  <path d="M 270 260 Q 400 230 530 260" fill="none" stroke="#2d2d2d" stroke-width="1"/>

</svg>