<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="crosshatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
    </pattern>
    <pattern id="stipple" width="5" height="5" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.7" fill="#1a1a1a" opacity="0.25"/>
      <circle cx="4" cy="4" r="0.5" fill="#1a1a1a" opacity="0.2"/>
    </pattern>
    <pattern id="hatch" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#1a1a1a" stroke-width="0.8" opacity="0.25"/>
    </pattern>
    
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="#ece6d9"/>
  <rect width="800" height="450" fill="url(#stipple)"/>
  <rect x="1" y="1" width="798" height="448" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.3"/>

  <!-- Dome -->
  <ellipse cx="400" cy="175" rx="150" ry="85" fill="url(#crosshatch)" stroke="#1a1a1a" stroke-width="3"/>
  <ellipse cx="400" cy="155" rx="105" ry="55" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
  <ellipse cx="400" cy="138" rx="65" ry="32" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="400" cy="106" r="10" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
  <line x1="400" y1="96" x2="400" y2="80" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Columns -->
  <line x1="280" y1="260" x2="280" y2="345" stroke="#1a1a1a" stroke-width="4"/>
  <line x1="330" y1="250" x2="330" y2="345" stroke="#1a1a1a" stroke-width="4"/>
  <line x1="380" y1="245" x2="380" y2="345" stroke="#1a1a1a" stroke-width="4"/>
  <line x1="420" y1="245" x2="420" y2="345" stroke="#1a1a1a" stroke-width="4"/>
  <line x1="470" y1="250" x2="470" y2="345" stroke="#1a1a1a" stroke-width="4"/>
  <line x1="520" y1="260" x2="520" y2="345" stroke="#1a1a1a" stroke-width="4"/>
  <!-- Column caps -->
  <rect x="270" y="253" width="20" height="8" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="320" y="243" width="20" height="8" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="370" y="238" width="20" height="8" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="410" y="238" width="20" height="8" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="460" y="243" width="20" height="8" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="510" y="253" width="20" height="8" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Base -->
  <rect x="250" y="345" width="300" height="18" fill="url(#hatch)" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Steps -->
  <line x1="230" y1="363" x2="570" y2="363" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="215" y1="376" x2="585" y2="376" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="200" y1="389" x2="600" y2="389" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Pediment -->
  <path d="M 260 260 L 400 220 L 540 260" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
</svg>