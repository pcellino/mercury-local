<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="crosshatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#8a7d65" stroke-width="0.8" opacity="0.4"/>
    </pattern>
    <pattern id="stipple" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.5" fill="#8a7d65" opacity="0.15"/>
    </pattern>
    <pattern id="hatch" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(60)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#8a7d65" stroke-width="0.6" opacity="0.35"/>
    </pattern>
    <pattern id="engrave" width="3" height="3" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#8a7d65" stroke-width="0.4" opacity="0.3"/>
    </pattern>
    
  </defs>
  <rect width="800" height="450" fill="#0f1419"/>
  <rect width="800" height="450" fill="url(#stipple)"/>

  <!-- Field -->
  <ellipse cx="400" cy="315" rx="290" ry="85" fill="url(#engrave)" stroke="#d4c5a9" stroke-width="2"/>
  <ellipse cx="400" cy="315" rx="55" ry="16" fill="none" stroke="#c8b88a" stroke-width="1" opacity="0.4"/>
  <line x1="400" y1="230" x2="400" y2="400" stroke="#c8b88a" stroke-width="1" opacity="0.3"/>
  <!-- Left stand -->
  <path d="M 110 230 L 110 140 L 280 98 L 280 230" fill="url(#crosshatch)" stroke="#d4c5a9" stroke-width="2.5"/>
  <line x1="120" y1="158" x2="270" y2="120" stroke="#c8b88a" stroke-width="1.2"/>
  <line x1="120" y1="178" x2="270" y2="145" stroke="#c8b88a" stroke-width="1.2"/>
  <line x1="120" y1="198" x2="270" y2="170" stroke="#c8b88a" stroke-width="1.2"/>
  <line x1="120" y1="218" x2="270" y2="195" stroke="#c8b88a" stroke-width="1.2"/>
  <!-- Right stand -->
  <path d="M 520 230 L 520 98 L 690 140 L 690 230" fill="url(#crosshatch)" stroke="#d4c5a9" stroke-width="2.5"/>
  <line x1="530" y1="120" x2="680" y2="158" stroke="#c8b88a" stroke-width="1.2"/>
  <line x1="530" y1="145" x2="680" y2="178" stroke="#c8b88a" stroke-width="1.2"/>
  <line x1="530" y1="170" x2="680" y2="198" stroke="#c8b88a" stroke-width="1.2"/>
  <line x1="530" y1="195" x2="680" y2="218" stroke="#c8b88a" stroke-width="1.2"/>
  <!-- Floodlights -->
  <line x1="130" y1="140" x2="130" y2="65" stroke="#d4c5a9" stroke-width="3"/>
  <rect x="114" y="52" width="32" height="14" fill="none" stroke="#d4c5a9" stroke-width="2"/>
  <line x1="670" y1="140" x2="670" y2="65" stroke="#d4c5a9" stroke-width="3"/>
  <rect x="654" y="52" width="32" height="14" fill="none" stroke="#d4c5a9" stroke-width="2"/>
  <!-- Light rays -->
  <line x1="130" y1="66" x2="250" y2="160" stroke="#8a7d65" stroke-width="0.6" opacity="0.3"/>
  <line x1="130" y1="66" x2="300" y2="190" stroke="#8a7d65" stroke-width="0.6" opacity="0.3"/>
  <line x1="670" y1="66" x2="550" y2="160" stroke="#8a7d65" stroke-width="0.6" opacity="0.3"/>
  <line x1="670" y1="66" x2="500" y2="190" stroke="#8a7d65" stroke-width="0.6" opacity="0.3"/>
  <!-- Corner elements -->
  <path d="M 40 40 L 80 40 M 40 40 L 40 80" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 760 40 L 720 40 M 760 40 L 760 80" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 40 410 L 80 410 M 40 410 L 40 370" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 760 410 L 720 410 M 760 410 L 760 370" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
</svg>