<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="crosshatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
    </pattern>
    <pattern id="stipple" width="5" height="5" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.7" fill="#1a1a1a" opacity="0.25"/>
      <circle cx="4" cy="4" r="0.5" fill="#1a1a1a" opacity="0.2"/>
    </pattern>
    <pattern id="hatch" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#1a1a1a" stroke-width="0.8" opacity="0.25"/>
    </pattern>
    
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="#ece6d9"/>
  <rect width="800" height="450" fill="url(#stipple)"/>
  <rect x="1" y="1" width="798" height="448" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.3"/>

  <!-- Field -->
  <ellipse cx="400" cy="310" rx="280" ry="80" fill="url(#hatch)" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Center line -->
  <line x1="400" y1="230" x2="400" y2="390" stroke="#1a1a1a" stroke-width="1.5" opacity="0.4"/>
  <!-- Center circle -->
  <ellipse cx="400" cy="310" rx="50" ry="15" fill="none" stroke="#1a1a1a" stroke-width="1.5" opacity="0.4"/>
  <!-- Left stands -->
  <path d="M 120 230 L 120 150 L 280 110 L 280 230" fill="url(#crosshatch)" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Seat rows left -->
  <line x1="130" y1="170" x2="270" y2="135" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="130" y1="190" x2="270" y2="160" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="130" y1="210" x2="270" y2="185" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Right stands -->
  <path d="M 520 230 L 520 110 L 680 150 L 680 230" fill="url(#crosshatch)" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Seat rows right -->
  <line x1="530" y1="135" x2="670" y2="170" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="530" y1="160" x2="670" y2="190" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="530" y1="185" x2="670" y2="210" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Floodlights -->
  <line x1="140" y1="150" x2="140" y2="80" stroke="#1a1a1a" stroke-width="3"/>
  <rect x="125" y="70" width="30" height="12" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="660" y1="150" x2="660" y2="80" stroke="#1a1a1a" stroke-width="3"/>
  <rect x="645" y="70" width="30" height="12" fill="none" stroke="#1a1a1a" stroke-width="2"/>
</svg>