<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="crosshatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#8a7d65" stroke-width="0.8" opacity="0.4"/>
    </pattern>
    <pattern id="stipple" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.5" fill="#8a7d65" opacity="0.15"/>
    </pattern>
    <pattern id="hatch" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(60)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#8a7d65" stroke-width="0.6" opacity="0.35"/>
    </pattern>
    <pattern id="engrave" width="3" height="3" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#8a7d65" stroke-width="0.4" opacity="0.3"/>
    </pattern>
    
  </defs>
  <rect width="800" height="450" fill="#0f1419"/>
  <rect width="800" height="450" fill="url(#stipple)"/>

  <!-- Inkwell -->
  <ellipse cx="330" cy="348" rx="70" ry="22" fill="url(#hatch)" stroke="#d4c5a9" stroke-width="2"/>
  <path d="M 260 348 L 260 295 Q 260 272 282 272 L 378 272 Q 400 272 400 295 L 400 348" fill="url(#crosshatch)" stroke="#d4c5a9" stroke-width="2.5"/>
  <ellipse cx="330" cy="272" rx="70" ry="20" fill="#0f1419" stroke="#d4c5a9" stroke-width="2.5"/>
  <ellipse cx="330" cy="275" rx="52" ry="13" fill="url(#engrave)" stroke="none"/>
  <!-- Quill -->
  <path d="M 365 268 Q 435 175 520 65" fill="none" stroke="#d4c5a9" stroke-width="2.5"/>
  <!-- Feather -->
  <path d="M 520 65 Q 555 90 565 150 Q 530 125 508 90 Q 520 65 520 65" fill="url(#crosshatch)" stroke="#c8b88a" stroke-width="1.8"/>
  <path d="M 520 65 Q 485 42 475 5 Q 510 30 530 55 Q 520 65 520 65" fill="url(#crosshatch)" stroke="#c8b88a" stroke-width="1.8"/>
  <!-- Feather spine -->
  <line x1="475" y1="5" x2="565" y2="150" stroke="#d4c5a9" stroke-width="1.5"/>
  <!-- Barbs -->
  <line x1="500" y1="82" x2="530" y2="65" stroke="#c8b88a" stroke-width="0.8" opacity="0.6"/>
  <line x1="506" y1="95" x2="540" y2="80" stroke="#c8b88a" stroke-width="0.8" opacity="0.6"/>
  <line x1="512" y1="108" x2="548" y2="95" stroke="#c8b88a" stroke-width="0.8" opacity="0.6"/>
  <line x1="518" y1="121" x2="555" y2="110" stroke="#c8b88a" stroke-width="0.8" opacity="0.6"/>
  <!-- Ink splatter -->
  <circle cx="380" cy="305" r="5" fill="#c8b88a" opacity="0.4"/>
  <circle cx="398" cy="318" r="3.5" fill="#c8b88a" opacity="0.3"/>
  <circle cx="415" cy="308" r="2.5" fill="#c8b88a" opacity="0.25"/>
  <!-- Corner elements -->
  <path d="M 40 40 L 80 40 M 40 40 L 40 80" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 760 40 L 720 40 M 760 40 L 760 80" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 40 410 L 80 410 M 40 410 L 40 370" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 760 410 L 720 410 M 760 410 L 760 370" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
</svg>