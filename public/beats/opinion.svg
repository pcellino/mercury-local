<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="crosshatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
    </pattern>
    <pattern id="stipple" width="5" height="5" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.7" fill="#1a1a1a" opacity="0.25"/>
      <circle cx="4" cy="4" r="0.5" fill="#1a1a1a" opacity="0.2"/>
    </pattern>
    <pattern id="hatch" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#1a1a1a" stroke-width="0.8" opacity="0.25"/>
    </pattern>
    
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="#ece6d9"/>
  <rect width="800" height="450" fill="url(#stipple)"/>
  <rect x="1" y="1" width="798" height="448" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.3"/>

  <!-- Inkwell -->
  <ellipse cx="340" cy="340" rx="65" ry="20" fill="url(#hatch)" stroke="#1a1a1a" stroke-width="2.5"/>
  <path d="M 275 340 L 275 290 Q 275 270 295 270 L 385 270 Q 405 270 405 290 L 405 340" fill="url(#crosshatch)" stroke="#1a1a1a" stroke-width="2.5"/>
  <ellipse cx="340" cy="270" rx="65" ry="18" fill="#ece6d9" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Ink surface -->
  <ellipse cx="340" cy="272" rx="50" ry="12" fill="url(#hatch)" stroke="none"/>
  <!-- Quill -->
  <path d="M 370 265 Q 430 180 500 80" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Feather vane -->
  <path d="M 500 80 Q 530 100 540 150 Q 510 130 490 100 Q 500 80 500 80" fill="url(#crosshatch)" stroke="#1a1a1a" stroke-width="2"/>
  <path d="M 500 80 Q 470 60 460 20 Q 490 40 510 60 Q 500 80 500 80" fill="url(#crosshatch)" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Feather spine -->
  <line x1="460" y1="20" x2="540" y2="150" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Quill barbs -->
  <line x1="485" y1="90" x2="510" y2="75" stroke="#1a1a1a" stroke-width="1" opacity="0.6"/>
  <line x1="490" y1="100" x2="518" y2="88" stroke="#1a1a1a" stroke-width="1" opacity="0.6"/>
  <line x1="495" y1="112" x2="525" y2="102" stroke="#1a1a1a" stroke-width="1" opacity="0.6"/>
  <!-- Ink drop -->
  <circle cx="380" cy="300" r="4" fill="#1a1a1a" opacity="0.5"/>
  <circle cx="395" cy="310" r="3" fill="#1a1a1a" opacity="0.4"/>
</svg>