<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="crosshatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#8a7d65" stroke-width="0.8" opacity="0.4"/>
    </pattern>
    <pattern id="stipple" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.5" fill="#8a7d65" opacity="0.15"/>
    </pattern>
    <pattern id="hatch" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(60)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#8a7d65" stroke-width="0.6" opacity="0.35"/>
    </pattern>
    <pattern id="engrave" width="3" height="3" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#8a7d65" stroke-width="0.4" opacity="0.3"/>
    </pattern>
    
  </defs>
  <rect width="800" height="450" fill="#0f1419"/>
  <rect width="800" height="450" fill="url(#stipple)"/>

  <!-- Newspaper -->
  <rect x="200" y="100" width="400" height="265" fill="url(#crosshatch)" stroke="#d4c5a9" stroke-width="2.5"/>
  <!-- Masthead -->
  <rect x="218" y="118" width="364" height="44" fill="#0f1419" stroke="#c8b88a" stroke-width="1.8"/>
  <line x1="255" y1="142" x2="545" y2="142" stroke="#d4c5a9" stroke-width="3"/>
  <!-- Date line -->
  <line x1="230" y1="175" x2="570" y2="175" stroke="#c8b88a" stroke-width="0.8" opacity="0.4"/>
  <!-- Column divider -->
  <line x1="400" y1="188" x2="400" y2="352" stroke="#c8b88a" stroke-width="1.2" opacity="0.4"/>
  <!-- Left headline -->
  <line x1="222" y1="195" x2="388" y2="195" stroke="#d4c5a9" stroke-width="2.5"/>
  <!-- Left text -->
  <line x1="222" y1="218" x2="388" y2="218" stroke="#c8b88a" stroke-width="1.2" opacity="0.5"/>
  <line x1="222" y1="236" x2="388" y2="236" stroke="#c8b88a" stroke-width="1.2" opacity="0.5"/>
  <line x1="222" y1="254" x2="388" y2="254" stroke="#c8b88a" stroke-width="1.2" opacity="0.5"/>
  <line x1="222" y1="272" x2="355" y2="272" stroke="#c8b88a" stroke-width="1.2" opacity="0.5"/>
  <!-- Right headline -->
  <line x1="412" y1="195" x2="578" y2="195" stroke="#d4c5a9" stroke-width="2.5"/>
  <!-- Right text -->
  <line x1="412" y1="218" x2="578" y2="218" stroke="#c8b88a" stroke-width="1.2" opacity="0.5"/>
  <line x1="412" y1="236" x2="578" y2="236" stroke="#c8b88a" stroke-width="1.2" opacity="0.5"/>
  <line x1="412" y1="254" x2="578" y2="254" stroke="#c8b88a" stroke-width="1.2" opacity="0.5"/>
  <line x1="412" y1="272" x2="548" y2="272" stroke="#c8b88a" stroke-width="1.2" opacity="0.5"/>
  <!-- Fold -->
  <line x1="200" y1="305" x2="600" y2="305" stroke="#c8b88a" stroke-width="0.8" opacity="0.3"/>
  <!-- Below fold -->
  <line x1="222" y1="322" x2="388" y2="322" stroke="#c8b88a" stroke-width="1" opacity="0.4"/>
  <line x1="412" y1="322" x2="578" y2="322" stroke="#c8b88a" stroke-width="1" opacity="0.4"/>
  <!-- Corner elements -->
  <path d="M 40 40 L 80 40 M 40 40 L 40 80" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 760 40 L 720 40 M 760 40 L 760 80" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 40 410 L 80 410 M 40 410 L 40 370" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 760 410 L 720 410 M 760 410 L 760 370" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
</svg>