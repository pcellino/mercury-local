<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="crosshatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
    </pattern>
    <pattern id="stipple" width="5" height="5" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.7" fill="#1a1a1a" opacity="0.25"/>
      <circle cx="4" cy="4" r="0.5" fill="#1a1a1a" opacity="0.2"/>
    </pattern>
    <pattern id="hatch" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#1a1a1a" stroke-width="0.8" opacity="0.25"/>
    </pattern>
    
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="#ece6d9"/>
  <rect width="800" height="450" fill="url(#stipple)"/>
  <rect x="1" y="1" width="798" height="448" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.3"/>

  <!-- Newspaper -->
  <rect x="220" y="110" width="360" height="240" fill="url(#crosshatch)" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Masthead -->
  <rect x="235" y="125" width="330" height="40" fill="#ece6d9" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="270" y1="148" x2="530" y2="148" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Date line -->
  <line x1="250" y1="175" x2="560" y2="175" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
  <!-- Column divider -->
  <line x1="400" y1="190" x2="400" y2="340" stroke="#1a1a1a" stroke-width="1.5" opacity="0.5"/>
  <!-- Left headline -->
  <line x1="240" y1="195" x2="385" y2="195" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Left text lines -->
  <line x1="240" y1="218" x2="385" y2="218" stroke="#1a1a1a" stroke-width="1.5" opacity="0.6"/>
  <line x1="240" y1="236" x2="385" y2="236" stroke="#1a1a1a" stroke-width="1.5" opacity="0.6"/>
  <line x1="240" y1="254" x2="385" y2="254" stroke="#1a1a1a" stroke-width="1.5" opacity="0.6"/>
  <line x1="240" y1="272" x2="360" y2="272" stroke="#1a1a1a" stroke-width="1.5" opacity="0.6"/>
  <!-- Right headline -->
  <line x1="415" y1="195" x2="565" y2="195" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Right text lines -->
  <line x1="415" y1="218" x2="565" y2="218" stroke="#1a1a1a" stroke-width="1.5" opacity="0.6"/>
  <line x1="415" y1="236" x2="565" y2="236" stroke="#1a1a1a" stroke-width="1.5" opacity="0.6"/>
  <line x1="415" y1="254" x2="565" y2="254" stroke="#1a1a1a" stroke-width="1.5" opacity="0.6"/>
  <line x1="415" y1="272" x2="540" y2="272" stroke="#1a1a1a" stroke-width="1.5" opacity="0.6"/>
  <!-- Fold line -->
  <line x1="220" y1="300" x2="580" y2="300" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
  <!-- Below fold text -->
  <line x1="240" y1="315" x2="385" y2="315" stroke="#1a1a1a" stroke-width="1.5" opacity="0.5"/>
  <line x1="415" y1="315" x2="565" y2="315" stroke="#1a1a1a" stroke-width="1.5" opacity="0.5"/>
</svg>