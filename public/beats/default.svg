<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="crosshatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#2d2d2d" stroke-width="0.5" opacity="0.15"/>
    </pattern>
    <pattern id="stipple" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.4" fill="#2d2d2d" opacity="0.2"/>
      <circle cx="4" cy="4" r="0.3" fill="#2d2d2d" opacity="0.15"/>
    </pattern>
    <pattern id="hatch-dense" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#2d2d2d" stroke-width="0.4" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="#f5f0e8"/>
  <rect width="800" height="450" fill="url(#stipple)"/>
  
  <!-- Newspaper -->
  <rect x="250" y="130" width="300" height="200" fill="none" stroke="#2d2d2d" stroke-width="1.5"/>
  <rect x="250" y="130" width="300" height="200" fill="url(#crosshatch)"/>
  <!-- Masthead area -->
  <rect x="260" y="140" width="280" height="30" fill="#f5f0e8" stroke="#2d2d2d" stroke-width="0.8"/>
  <line x1="280" y1="155" x2="520" y2="155" stroke="#2d2d2d" stroke-width="1.5"/>
  <!-- Column lines -->
  <line x1="390" y1="185" x2="390" y2="320" stroke="#2d2d2d" stroke-width="0.4" opacity="0.3"/>
  <!-- Text lines left -->
  <line x1="270" y1="195" x2="375" y2="195" stroke="#2d2d2d" stroke-width="0.5" opacity="0.4"/>
  <line x1="270" y1="210" x2="375" y2="210" stroke="#2d2d2d" stroke-width="0.5" opacity="0.4"/>
  <line x1="270" y1="225" x2="375" y2="225" stroke="#2d2d2d" stroke-width="0.5" opacity="0.4"/>
  <line x1="270" y1="240" x2="360" y2="240" stroke="#2d2d2d" stroke-width="0.5" opacity="0.4"/>
  <!-- Text lines right -->
  <line x1="405" y1="195" x2="535" y2="195" stroke="#2d2d2d" stroke-width="0.5" opacity="0.4"/>
  <line x1="405" y1="210" x2="535" y2="210" stroke="#2d2d2d" stroke-width="0.5" opacity="0.4"/>
  <line x1="405" y1="225" x2="535" y2="225" stroke="#2d2d2d" stroke-width="0.5" opacity="0.4"/>
  <line x1="405" y1="240" x2="520" y2="240" stroke="#2d2d2d" stroke-width="0.5" opacity="0.4"/>
  <!-- Fold line -->
  <line x1="250" y1="260" x2="550" y2="260" stroke="#2d2d2d" stroke-width="0.4" opacity="0.2"/>

</svg>