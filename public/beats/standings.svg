<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="crosshatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#8a7d65" stroke-width="0.8" opacity="0.4"/>
    </pattern>
    <pattern id="stipple" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.5" fill="#8a7d65" opacity="0.15"/>
    </pattern>
    <pattern id="engrave" width="3" height="3" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#8a7d65" stroke-width="0.4" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="#0f1419"/>
  <rect width="800" height="450" fill="url(#stipple)"/>

  <!-- Trophy -->
  <g transform="translate(400, 225)">
    <!-- Trophy cup -->
    <path d="M -60 -120 L -70 -40 Q -70 20, 0 40 Q 70 20, 70 -40 L 60 -120 Z" fill="url(#crosshatch)" stroke="#d4c5a9" stroke-width="2.5"/>
    <!-- Trophy rim -->
    <ellipse cx="0" cy="-120" rx="65" ry="12" fill="none" stroke="#d4c5a9" stroke-width="2.5"/>
    <!-- Trophy handles -->
    <path d="M -70 -90 Q -110 -80, -110 -50 Q -110 -20, -70 -10" fill="none" stroke="#d4c5a9" stroke-width="2.5"/>
    <path d="M 70 -90 Q 110 -80, 110 -50 Q 110 -20, 70 -10" fill="none" stroke="#d4c5a9" stroke-width="2.5"/>
    <!-- Trophy stem -->
    <rect x="-10" y="40" width="20" height="50" fill="url(#engrave)" stroke="#d4c5a9" stroke-width="2"/>
    <!-- Trophy base -->
    <rect x="-50" y="90" width="100" height="16" rx="3" fill="url(#engrave)" stroke="#d4c5a9" stroke-width="2"/>
    <rect x="-40" y="106" width="80" height="10" rx="2" fill="none" stroke="#d4c5a9" stroke-width="1.5"/>
    <!-- Trophy interior lines -->
    <line x1="-40" y1="-90" x2="40" y2="-90" stroke="#c8b88a" stroke-width="1" opacity="0.4"/>
    <line x1="-45" y1="-70" x2="45" y2="-70" stroke="#c8b88a" stroke-width="1" opacity="0.4"/>
    <line x1="-50" y1="-50" x2="50" y2="-50" stroke="#c8b88a" stroke-width="1" opacity="0.4"/>
    <!-- Star on trophy -->
    <polygon points="0,-75 8,-55 28,-55 12,-42 18,-22 0,-33 -18,-22 -12,-42 -28,-55 -8,-55" fill="none" stroke="#d4c5a9" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Corner elements -->
  <path d="M 40 40 L 80 40 M 40 40 L 40 80" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 760 40 L 720 40 M 760 40 L 760 80" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 40 410 L 80 410 M 40 410 L 40 370" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 760 410 L 720 410 M 760 410 L 760 370" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
</svg>