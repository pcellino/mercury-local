<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="crosshatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#8a7d65" stroke-width="0.8" opacity="0.4"/>
    </pattern>
    <pattern id="stipple" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.5" fill="#8a7d65" opacity="0.15"/>
    </pattern>
    <pattern id="engrave" width="3" height="3" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#8a7d65" stroke-width="0.4" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="#0f1419"/>
  <rect width="800" height="450" fill="url(#stipple)"/>

  <!-- Microphone -->
  <g transform="translate(400, 225)">
    <!-- Mic head -->
    <ellipse cx="0" cy="-80" rx="45" ry="65" fill="url(#crosshatch)" stroke="#d4c5a9" stroke-width="2.5"/>
    <!-- Mic grille lines -->
    <line x1="-30" y1="-110" x2="30" y2="-110" stroke="#c8b88a" stroke-width="1" opacity="0.5"/>
    <line x1="-35" y1="-95" x2="35" y2="-95" stroke="#c8b88a" stroke-width="1" opacity="0.5"/>
    <line x1="-38" y1="-80" x2="38" y2="-80" stroke="#c8b88a" stroke-width="1" opacity="0.5"/>
    <line x1="-35" y1="-65" x2="35" y2="-65" stroke="#c8b88a" stroke-width="1" opacity="0.5"/>
    <line x1="-30" y1="-50" x2="30" y2="-50" stroke="#c8b88a" stroke-width="1" opacity="0.5"/>
    <!-- Mic body -->
    <rect x="-12" y="-15" width="24" height="100" fill="url(#engrave)" stroke="#d4c5a9" stroke-width="2"/>
    <!-- Mic collar -->
    <rect x="-20" y="-18" width="40" height="8" rx="3" fill="none" stroke="#d4c5a9" stroke-width="2"/>
    <!-- Mic base -->
    <ellipse cx="0" cy="90" rx="55" ry="15" fill="url(#engrave)" stroke="#d4c5a9" stroke-width="2"/>
    <line x1="-12" y1="85" x2="-30" y2="88" stroke="#d4c5a9" stroke-width="2"/>
    <line x1="12" y1="85" x2="30" y2="88" stroke="#d4c5a9" stroke-width="2"/>
  </g>

  <!-- Sound waves -->
  <path d="M 310 120 Q 290 145, 310 170" fill="none" stroke="#c8b88a" stroke-width="1.5" opacity="0.4"/>
  <path d="M 290 105 Q 260 145, 290 185" fill="none" stroke="#c8b88a" stroke-width="1.2" opacity="0.3"/>
  <path d="M 490 120 Q 510 145, 490 170" fill="none" stroke="#c8b88a" stroke-width="1.5" opacity="0.4"/>
  <path d="M 510 105 Q 540 145, 510 185" fill="none" stroke="#c8b88a" stroke-width="1.2" opacity="0.3"/>

  <!-- Corner elements -->
  <path d="M 40 40 L 80 40 M 40 40 L 40 80" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 760 40 L 720 40 M 760 40 L 760 80" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 40 410 L 80 410 M 40 410 L 40 370" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 760 410 L 720 410 M 760 410 L 760 370" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
</svg>