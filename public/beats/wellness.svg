<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="crosshatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
    </pattern>
    <pattern id="stipple" width="5" height="5" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.7" fill="#1a1a1a" opacity="0.25"/>
      <circle cx="4" cy="4" r="0.5" fill="#1a1a1a" opacity="0.2"/>
    </pattern>
    <pattern id="hatch" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#1a1a1a" stroke-width="0.8" opacity="0.25"/>
    </pattern>
    
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="#ece6d9"/>
  <rect width="800" height="450" fill="url(#stipple)"/>
  <rect x="1" y="1" width="798" height="448" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.3"/>

  <!-- Leaf shape -->
  <path d="M 400 80 Q 550 180 500 300 Q 440 390 400 400 Q 360 390 300 300 Q 250 180 400 80 Z" fill="url(#crosshatch)" stroke="#1a1a1a" stroke-width="3.5"/>
  <!-- Center vein -->
  <path d="M 400 100 Q 400 250 400 390" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Side veins -->
  <path d="M 400 160 Q 350 180 310 200" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <path d="M 400 160 Q 450 180 490 200" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <path d="M 400 220 Q 340 250 300 275" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <path d="M 400 220 Q 460 250 500 275" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <path d="M 400 280 Q 355 305 330 330" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M 400 280 Q 445 305 470 330" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Stem -->
  <path d="M 400 390 Q 410 410 430 420" fill="none" stroke="#1a1a1a" stroke-width="3"/>
</svg>