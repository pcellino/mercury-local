  <path d="M 400 280 Q 350 310 320 340" fill="none" stroke="#c8b88a" stroke-width="1.5"/>
  <path d="M 400 280 Q 450 310 480 340" fill="none" stroke="#c8b88a" stroke-width="1.5"/>
  <!-- Stem -->
  <path d="M 400 405 Q 412 425 438 432" fill="none" stroke="#d4c5a9" stroke-width="2.5"/>
  <!-- Corner elements -->
