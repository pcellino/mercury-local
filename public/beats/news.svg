<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="crosshatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#8a7d65" stroke-width="0.8" opacity="0.4"/>
    </pattern>
    <pattern id="stipple" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.5" fill="#8a7d65" opacity="0.15"/>
    </pattern>
    <pattern id="engrave" width="3" height="3" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#8a7d65" stroke-width="0.4" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="#0f1419"/>
  <rect width="800" height="450" fill="url(#stipple)"/>

  <!-- Checkered flag -->
  <g transform="translate(300, 60)">
    <!-- Flag pole -->
    <line x1="0" y1="0" x2="0" y2="340" stroke="#d4c5a9" stroke-width="4"/>
    <circle cx="0" cy="0" r="6" fill="#d4c5a9"/>
    <!-- Flag fabric with wave -->
    <path d="M 0 15 Q 60 5, 120 20 Q 180 35, 200 25 L 200 165 Q 180 175, 120 160 Q 60 145, 0 155 Z" fill="url(#crosshatch)" stroke="#d4c5a9" stroke-width="2"/>
    <!-- Checker pattern on flag -->
    <g opacity="0.7">
      <rect x="10" y="30" width="22" height="22" fill="#d4c5a9" opacity="0.6"/>
      <rect x="54" y="30" width="22" height="22" fill="#d4c5a9" opacity="0.6"/>
      <rect x="98" y="30" width="22" height="22" fill="#d4c5a9" opacity="0.6"/>
      <rect x="142" y="30" width="22" height="22" fill="#d4c5a9" opacity="0.6"/>
      <rect x="32" y="52" width="22" height="22" fill="#d4c5a9" opacity="0.6"/>
      <rect x="76" y="52" width="22" height="22" fill="#d4c5a9" opacity="0.6"/>
      <rect x="120" y="52" width="22" height="22" fill="#d4c5a9" opacity="0.6"/>
      <rect x="164" y="52" width="22" height="22" fill="#d4c5a9" opacity="0.6"/>
      <rect x="10" y="74" width="22" height="22" fill="#d4c5a9" opacity="0.6"/>
      <rect x="54" y="74" width="22" height="22" fill="#d4c5a9" opacity="0.6"/>
      <rect x="98" y="74" width="22" height="22" fill="#d4c5a9" opacity="0.6"/>
      <rect x="142" y="74" width="22" height="22" fill="#d4c5a9" opacity="0.6"/>
      <rect x="32" y="96" width="22" height="22" fill="#d4c5a9" opacity="0.6"/>
      <rect x="76" y="96" width="22" height="22" fill="#d4c5a9" opacity="0.6"/>
      <rect x="120" y="96" width="22" height="22" fill="#d4c5a9" opacity="0.6"/>
      <rect x="164" y="96" width="22" height="22" fill="#d4c5a9" opacity="0.6"/>
      <rect x="10" y="118" width="22" height="22" fill="#d4c5a9" opacity="0.6"/>
      <rect x="54" y="118" width="22" height="22" fill="#d4c5a9" opacity="0.6"/>
      <rect x="98" y="118" width="22" height="22" fill="#d4c5a9" opacity="0.6"/>
      <rect x="142" y="118" width="22" height="22" fill="#d4c5a9" opacity="0.6"/>
    </g>
  </g>

  <!-- Track oval outline at bottom -->
  <ellipse cx="400" cy="370" rx="220" ry="50" fill="none" stroke="#c8b88a" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="400" cy="370" rx="180" ry="38" fill="none" stroke="#c8b88a" stroke-width="1" opacity="0.25"/>

  <!-- Corner elements -->
  <path d="M 40 40 L 80 40 M 40 40 L 40 80" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 760 40 L 720 40 M 760 40 L 760 80" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 40 410 L 80 410 M 40 410 L 40 370" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 760 410 L 720 410 M 760 410 L 760 370" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
</svg>