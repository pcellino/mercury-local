<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="crosshatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#2d2d2d" stroke-width="0.5" opacity="0.15"/>
    </pattern>
    <pattern id="stipple" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.4" fill="#2d2d2d" opacity="0.2"/>
      <circle cx="4" cy="4" r="0.3" fill="#2d2d2d" opacity="0.15"/>
    </pattern>
    <pattern id="hatch-dense" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#2d2d2d" stroke-width="0.4" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="#f5f0e8"/>
  <rect width="800" height="450" fill="url(#stipple)"/>
  
  <!-- Shield outline -->
  <path d="M 400 100 L 480 140 L 490 220 L 450 300 L 400 340 L 350 300 L 310 220 L 320 140 Z" 
        fill="none" stroke="#2d2d2d" stroke-width="2" stroke-linejoin="round"/>
  <path d="M 400 100 L 480 140 L 490 220 L 450 300 L 400 340 L 350 300 L 310 220 L 320 140 Z" 
        fill="url(#crosshatch)"/>
  <!-- Inner shield -->
  <path d="M 400 130 L 460 158 L 468 220 L 435 280 L 400 310 L 365 280 L 332 220 L 340 158 Z" 
        fill="none" stroke="#2d2d2d" stroke-width="1.2"/>
  <!-- Star -->
  <polygon points="400,160 408,190 440,190 414,208 423,238 400,220 377,238 386,208 360,190 392,190" 
           fill="none" stroke="#2d2d2d" stroke-width="1.5"/>
  <polygon points="400,160 408,190 440,190 414,208 423,238 400,220 377,238 386,208 360,190 392,190" 
           fill="url(#stipple)"/>
  <!-- Decorative lines -->
  <line x1="350" y1="260" x2="450" y2="260" stroke="#2d2d2d" stroke-width="0.8"/>
  <line x1="360" y1="270" x2="440" y2="270" stroke="#2d2d2d" stroke-width="0.6"/>

</svg>