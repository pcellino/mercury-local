<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="crosshatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
    </pattern>
    <pattern id="stipple" width="5" height="5" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.7" fill="#1a1a1a" opacity="0.25"/>
      <circle cx="4" cy="4" r="0.5" fill="#1a1a1a" opacity="0.2"/>
    </pattern>
    <pattern id="hatch" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#1a1a1a" stroke-width="0.8" opacity="0.25"/>
    </pattern>
    
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="#ece6d9"/>
  <rect width="800" height="450" fill="url(#stipple)"/>
  <rect x="1" y="1" width="798" height="448" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.3"/>

  <!-- Crane tower -->
  <rect x="270" y="80" width="30" height="320" fill="url(#hatch)" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Cross bracing on tower -->
  <line x1="270" y1="120" x2="300" y2="180" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="300" y1="120" x2="270" y2="180" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="270" y1="200" x2="300" y2="260" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="300" y1="200" x2="270" y2="260" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="270" y1="280" x2="300" y2="340" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="300" y1="280" x2="270" y2="340" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Boom arm -->
  <line x1="285" y1="85" x2="600" y2="85" stroke="#1a1a1a" stroke-width="3.5"/>
  <!-- Counter arm -->
  <line x1="285" y1="85" x2="150" y2="85" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Counterweight -->
  <rect x="140" y="85" width="35" height="30" fill="url(#crosshatch)" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Cable supports -->
  <line x1="285" y1="55" x2="600" y2="85" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="285" y1="55" x2="150" y2="85" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="285" y1="55" x2="285" y2="80" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Hook cable -->
  <line x1="500" y1="85" x2="500" y2="220" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Hook -->
  <path d="M 490 220 L 510 220 L 510 240 Q 510 260 500 260 Q 490 260 490 240 Z" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Building under construction -->
  <rect x="420" y="280" width="180" height="120" fill="url(#crosshatch)" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="430" y="295" width="35" height="30" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="480" y="295" width="35" height="30" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="530" y="295" width="35" height="30" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Ground -->
  <line x1="100" y1="400" x2="700" y2="400" stroke="#1a1a1a" stroke-width="2"/>
</svg>