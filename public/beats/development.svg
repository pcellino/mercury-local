<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="crosshatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#8a7d65" stroke-width="0.8" opacity="0.4"/>
    </pattern>
    <pattern id="stipple" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.5" fill="#8a7d65" opacity="0.15"/>
    </pattern>
    <pattern id="hatch" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(60)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#8a7d65" stroke-width="0.6" opacity="0.35"/>
    </pattern>
    <pattern id="engrave" width="3" height="3" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#8a7d65" stroke-width="0.4" opacity="0.3"/>
    </pattern>
    
  </defs>
  <rect width="800" height="450" fill="#0f1419"/>
  <rect width="800" height="450" fill="url(#stipple)"/>

  <!-- Tower -->
  <rect x="268" y="75" width="34" height="330" fill="url(#hatch)" stroke="#d4c5a9" stroke-width="2.5"/>
  <!-- Cross bracing -->
  <line x1="268" y1="115" x2="302" y2="180" stroke="#c8b88a" stroke-width="1.2"/>
  <line x1="302" y1="115" x2="268" y2="180" stroke="#c8b88a" stroke-width="1.2"/>
  <line x1="268" y1="195" x2="302" y2="260" stroke="#c8b88a" stroke-width="1.2"/>
  <line x1="302" y1="195" x2="268" y2="260" stroke="#c8b88a" stroke-width="1.2"/>
  <line x1="268" y1="275" x2="302" y2="340" stroke="#c8b88a" stroke-width="1.2"/>
  <line x1="302" y1="275" x2="268" y2="340" stroke="#c8b88a" stroke-width="1.2"/>
  <!-- Boom -->
  <line x1="285" y1="80" x2="620" y2="80" stroke="#d4c5a9" stroke-width="3.5"/>
  <!-- Counter boom -->
  <line x1="285" y1="80" x2="140" y2="80" stroke="#d4c5a9" stroke-width="3"/>
  <!-- Counterweight -->
  <rect x="128" y="80" width="38" height="35" fill="url(#crosshatch)" stroke="#d4c5a9" stroke-width="2"/>
  <!-- Cable supports -->
  <line x1="285" y1="48" x2="620" y2="80" stroke="#c8b88a" stroke-width="1.8"/>
  <line x1="285" y1="48" x2="140" y2="80" stroke="#c8b88a" stroke-width="1.8"/>
  <line x1="285" y1="48" x2="285" y2="75" stroke="#d4c5a9" stroke-width="2.5"/>
  <!-- Hook cable -->
  <line x1="510" y1="80" x2="510" y2="225" stroke="#c8b88a" stroke-width="1.8"/>
  <!-- Hook -->
  <path d="M 500 225 L 520 225 L 520 248 Q 520 265 510 265 Q 500 265 500 248 Z" fill="none" stroke="#d4c5a9" stroke-width="2.5"/>
  <!-- Building under construction -->
  <rect x="420" y="285" width="190" height="120" fill="url(#crosshatch)" stroke="#d4c5a9" stroke-width="2"/>
  <rect x="432" y="300" width="38" height="32" fill="none" stroke="#c8b88a" stroke-width="1.2"/>
  <rect x="486" y="300" width="38" height="32" fill="none" stroke="#c8b88a" stroke-width="1.2"/>
  <rect x="540" y="300" width="38" height="32" fill="none" stroke="#c8b88a" stroke-width="1.2"/>
  <rect x="432" y="348" width="38" height="32" fill="none" stroke="#c8b88a" stroke-width="1.2"/>
  <rect x="486" y="348" width="38" height="32" fill="none" stroke="#c8b88a" stroke-width="1.2"/>
  <!-- Ground -->
  <line x1="80" y1="405" x2="720" y2="405" stroke="#c8b88a" stroke-width="1.8"/>
  <!-- Corner elements -->
  <path d="M 40 40 L 80 40 M 40 40 L 40 80" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 760 40 L 720 40 M 760 40 L 760 80" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 40 410 L 80 410 M 40 410 L 40 370" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 760 410 L 720 410 M 760 410 L 760 370" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
</svg>