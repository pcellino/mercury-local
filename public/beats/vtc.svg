<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <pattern id="crosshatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#8a7d65" stroke-width="0.8" opacity="0.4"/>
    </pattern>
    <pattern id="stipple" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.5" fill="#8a7d65" opacity="0.15"/>
    </pattern>
    <pattern id="engrave" width="3" height="3" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#8a7d65" stroke-width="0.4" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="#0f1419"/>
  <rect width="800" height="450" fill="url(#stipple)"/>

  <!-- Short track oval -->
  <g transform="translate(400, 210)">
    <!-- Outer wall -->
    <ellipse cx="0" cy="0" rx="230" ry="130" fill="none" stroke="#d4c5a9" stroke-width="3"/>
    <!-- Inner wall / apron -->
    <ellipse cx="0" cy="0" rx="170" ry="90" fill="url(#engrave)" stroke="#c8b88a" stroke-width="2"/>
    <!-- Racing surface between walls -->
    <ellipse cx="0" cy="0" rx="200" ry="110" fill="none" stroke="#c8b88a" stroke-width="1" opacity="0.4"/>
    <!-- Start/finish line -->
    <line x1="0" y1="-130" x2="0" y2="-90" stroke="#d4c5a9" stroke-width="3"/>
    <!-- Turn markers -->
    <text x="-195" y="5" font-family="Inter, sans-serif" font-size="14" fill="#c8b88a" opacity="0.5" text-anchor="middle">1</text>
    <text x="0" y="140" font-family="Inter, sans-serif" font-size="14" fill="#c8b88a" opacity="0.5" text-anchor="middle">2</text>
    <text x="195" y="5" font-family="Inter, sans-serif" font-size="14" fill="#c8b88a" opacity="0.5" text-anchor="middle">3</text>
    <text x="0" y="-148" font-family="Inter, sans-serif" font-size="14" fill="#c8b88a" opacity="0.5" text-anchor="middle">4</text>
    <!-- Pit road -->
    <line x1="-80" y1="130" x2="80" y2="130" stroke="#c8b88a" stroke-width="1.5" opacity="0.4"/>
    <line x1="-80" y1="145" x2="80" y2="145" stroke="#c8b88a" stroke-width="1" opacity="0.3"/>
    <!-- Pit stalls -->
    <line x1="-50" y1="130" x2="-50" y2="145" stroke="#c8b88a" stroke-width="0.8" opacity="0.3"/>
    <line x1="-20" y1="130" x2="-20" y2="145" stroke="#c8b88a" stroke-width="0.8" opacity="0.3"/>
    <line x1="10" y1="130" x2="10" y2="145" stroke="#c8b88a" stroke-width="0.8" opacity="0.3"/>
    <line x1="40" y1="130" x2="40" y2="145" stroke="#c8b88a" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- "VTC" letters subtly below -->
  <text x="400" y="405" font-family="'Playfair Display', Georgia, serif" font-size="18" fill="#c8b88a" opacity="0.25" text-anchor="middle" letter-spacing="8">VIRGINIA TRIPLE CROWN</text>

  <!-- Corner elements -->
  <path d="M 40 40 L 80 40 M 40 40 L 40 80" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 760 40 L 720 40 M 760 40 L 760 80" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 40 410 L 80 410 M 40 410 L 40 370" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
  <path d="M 760 410 L 720 410 M 760 410 L 760 370" stroke="#8a7d65" stroke-width="1.5" opacity="0.5"/>
</svg>